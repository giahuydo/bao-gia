services:
  - type: web
    name: bao-gia-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
    healthCheckPath: /api/health
