version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: baogia-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bao_gia
    ports:
      - '5432:5432'
    volumes:
      - baogia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baogia-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: baogia-frontend
    env_file:
      - ./frontend/.env.local
    ports:
      - '4000:4000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  baogia_postgres_data:
